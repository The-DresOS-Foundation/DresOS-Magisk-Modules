name: microG auto-update

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq zip unzip openssl

      - name: Fetch upstream APKs
        run: bash microg/refresh-upstream.sh

      - name: Bump module version if microG moved
        id: bump
        run: bash microg/bump-version.sh

      - name: Build module zip
        if: steps.bump.outputs.changed == 'true'
        working-directory: microg
        run: bash build-module.sh

      - name: Commit version bump
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add microg/module.prop microg/update.json microg/CHANGELOG.md microg/UPSTREAM_GMSCORE
          git commit -m "microG auto-update: ${{ steps.bump.outputs.newver }}"
          git push

      - name: Publish release
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "microg-${{ steps.bump.outputs.newver }}" \
            "microg/${{ steps.bump.outputs.zip }}" \
            --title "DresOS microG ${{ steps.bump.outputs.newver }}" \
            --notes "Automated build with the latest officially-signed microG core."
